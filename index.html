<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hoja de Vida Jorge Meza</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, sans-serif;
      background: #f4f7fb;
      color: #1f2937;
      line-height: 1.5;
    }

    header {
      background: linear-gradient(135deg, #0f172a, #1d4ed8);
      color: white;
      padding: 40px 20px;
      text-align: center;
    }

    header h1 {
      font-size: 2rem;
      margin-bottom: 10px;
    }

    header p {
      font-size: 1rem;
      opacity: 0.95;
    }

    .contenedor {
      width: 90%;
      max-width: 1100px;
      margin: 30px auto;
    }

    .seccion {
      background: white;
      margin-bottom: 25px;
      padding: 25px;
      border-radius: 14px;
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.08);
    }

    .seccion h2 {
      margin-bottom: 18px;
      color: #0f172a;
      border-left: 5px solid #2563eb;
      padding-left: 10px;
      font-size: 1.3rem;
    }

    .visor-pdf iframe {
      width: 100%;
      height: 650px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
    }

    .botones {
      margin-top: 15px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .boton {
      display: inline-block;
      background: #2563eb;
      color: white;
      text-decoration: none;
      padding: 12px 18px;
      border-radius: 8px;
      font-weight: bold;
      transition: 0.3s ease;
    }

    .boton:hover {
      background: #1d4ed8;
    }

    .galeria {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 18px;
    }

    .tarjeta {
      background: #f8fafc;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 3px 10px rgba(0, 0, 0, 0.05);
    }

    .tarjeta img {
      width: 100%;
      height: 260px;
      object-fit: cover;
      display: block;
    }

    .tarjeta .info {
      padding: 14px;
      text-align: center;
    }

    .tarjeta .info p {
      margin-bottom: 10px;
      font-weight: bold;
      color: #334155;
      word-break: break-word;
    }

    footer {
      text-align: center;
      padding: 25px 15px;
      color: #64748b;
      font-size: 0.95rem;
    }

    @media (max-width: 768px) {
      .visor-pdf iframe {
        height: 420px;
      }

      header h1 {
        font-size: 1.6rem;
      }
    }
  </style>
</head>
<body>

  <header>
    <h1>Hoja de Vida - Jorge Meza</h1>
    <p>Visualización y descarga de documento PDF e imágenes</p>
  </header>

  <main class="contenedor">

    <section class="seccion">
      <h2>Documento PDF</h2>
      <div class="visor-pdf">
        <iframe src="HOJA DE VIDA JORGE MEZA.pdf"></iframe>
      </div>
      <div class="botones">
        <a class="boton" href="HOJA DE VIDA JORGE MEZA.pdf" target="_blank">Abrir PDF</a>
        <a class="boton" href="HOJA DE VIDA JORGE MEZA.pdf" download>Descargar PDF</a>
      </div>
    </section>

    <section class="seccion">
      <h2>Galería de imágenes</h2>
      <div class="galeria">

        <div class="tarjeta">
          <img src="IMG_20191203_090218.jpg" alt="Imagen 1">
          <div class="info">
            <p>IMG_20191203_090218.jpg</p>
            <a class="boton" href="IMG_20191203_090218.jpg" target="_blank">Ver imagen</a>
          </div>
        </div>

        <div class="tarjeta">
          <img src="IMG_20191203_131912.jpg" alt="Imagen 2">
          <div class="info">
            <p>IMG_20191203_131912.jpg</p>
            <a class="boton" href="IMG_20191203_131912.jpg" target="_blank">Ver imagen</a>
          </div>
        </div>

        <div class="tarjeta">
          <img src="IMG_20210110_133854.jpg" alt="Imagen 3">
          <div class="info">
            <p>IMG_20210110_133854.jpg</p>
            <a class="boton" href="IMG_20210110_133854.jpg" target="_blank">Ver imagen</a>
          </div>
        </div>

      </div>
    </section>

  </main>

  <footer>
    Sitio publicado en GitHub Pages
  </footer>

</body>
</html>
